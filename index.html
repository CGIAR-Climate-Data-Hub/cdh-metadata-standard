<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CDH Metadata Standard</title>
  </head>
  <body>
    <script>
      // Lists version directories on the gh-pages branch via the GitHub API at
      // view time (no build step, always current).
      (async () => {
        // ponytail: derive owner/repo from the Pages URL so a repo rename
        // never breaks this page again. (Project page: /<repo>/…)
        const repo =
          location.hostname.split(".")[0] + "/" + location.pathname.split("/")[1];
        const res = await fetch(
          `https://api.github.com/repos/${repo}/git/trees/gh-pages?recursive=1`,
        );
        const data = await res.json();
        const tree = data.tree || [];
        const versions = tree
          .filter((f) => f.type === "tree" && /^v\d+\.\d+\.\d+$/.test(f.path))
          .map((f) => f.path)
          .sort((a, b) => b.localeCompare(a, undefined, { numeric: true }));

        // Entry schema was renamed (metadata-input → core); link whichever
        // this version actually published.
        const paths = new Set(tree.map((f) => f.path));
        const entry = (v) =>
          [`${v}/schemas/core.schema.json`, `${v}/schemas/metadata-input.schema.json`]
            .find((p) => paths.has(p)) || v;

        let html = "<h1>CDH Metadata Standard schemas & vocabularies</h1><ul>";
        for (const v of versions) {
          html += `<li><a href="${entry(v)}">${v}</a></li>`;
        }
        html += "</ul>";
        document.body.innerHTML = html;
      })();
    </script>
  </body>
</html>
