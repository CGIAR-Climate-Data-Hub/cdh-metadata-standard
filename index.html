<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CDH Metadata Standard</title>
  </head>
  <body>
    <script>
      // Browsable directory listing for the gh-pages branch, fetched from the
      // GitHub API at view time (no build step, always current). The URL hash
      // is the "current folder" — clicking a folder navigates to a new page
      // (and the browser Back button just works).
      (async () => {
        // Derive owner/repo from the Pages URL so a repo rename never breaks
        // this page. (Project page: /<repo>/…)
        const repo =
          location.hostname.split(".")[0] + "/" + location.pathname.split("/")[1];
        const res = await fetch(
          `https://api.github.com/repos/${repo}/git/trees/gh-pages?recursive=1`,
        );
        const data = await res.json();
        const paths = (data.tree || [])
          .filter((f) => f.type === "blob")
          .map((f) => f.path)
          .filter((p) => !p.split("/").pop().startsWith(".")); // hide .nojekyll etc.

        const render = () => {
          const cur = decodeURIComponent(location.hash.slice(1));
          const base = cur ? cur + "/" : "";
          const here = paths
            .filter((p) => p.startsWith(base))
            .map((p) => p.slice(base.length));
          const dirs = [...new Set(here.filter((r) => r.includes("/")).map((r) => r.split("/")[0]))]
            .sort((a, b) => b.localeCompare(a, undefined, { numeric: true })); // newest version first
          const files = here.filter((r) => !r.includes("/")).sort();

          const crumbs = ["root", ...(cur ? cur.split("/") : [])]
            .map((s, i, a) => `<a href="#${encodeURIComponent(a.slice(1, i + 1).join("/"))}">${s}</a>`)
            .join(" / ");

          const links = [
            ...dirs.map((d) => `<a href="#${encodeURIComponent(base + d)}">${d}/</a>`),
            ...files.map((f) => `<a href="${base + f}">${f}</a>`),
          ];
          document.body.innerHTML =
            `<h1>CDH Metadata Standard</h1><p>${crumbs}</p><ul><li>${links.join("</li><li>")}</li></ul>`;
        };

        addEventListener("hashchange", render);
        render();
      })();
    </script>
  </body>
</html>
