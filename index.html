<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CDH Metadata Standard</title>
  </head>
  <body>
    <script>
      // Lists version directories on the gh-pages branch via the GitHub API at
      // view time (no build step, always current).
      (async () => {
        // ponytail: derive owner/repo from the Pages URL so a repo rename
        // never breaks this page again. (Project page: /<repo>/…)
        const repo =
          location.hostname.split(".")[0] + "/" + location.pathname.split("/")[1];
        const res = await fetch(
          `https://api.github.com/repos/${repo}/git/trees/gh-pages?recursive=1`,
        );
        const data = await res.json();

        // Build a nested folder structure from the flat path list, then render
        // it as a browsable file tree.
        const root = {};
        for (const f of data.tree || []) {
          if (f.type !== "blob") continue;
          const parts = f.path.split("/");
          if (parts.at(-1).startsWith(".")) continue; // hide .nojekyll etc.
          let node = root;
          for (const p of parts.slice(0, -1)) node = node[p] ??= {};
          (node._files ??= []).push({ name: parts.at(-1), path: f.path });
        }

        // ponytail: native <details> folders — no tree library, no build step.
        const render = (node) => {
          const dirs = Object.keys(node)
            .filter((k) => k !== "_files")
            .sort((a, b) => b.localeCompare(a, undefined, { numeric: true }));
          let html = "<ul>";
          for (const d of dirs)
            html += `<li><details><summary>${d}/</summary>${render(node[d])}</details></li>`;
          for (const f of (node._files || []).sort((a, b) => a.name.localeCompare(b.name)))
            html += `<li><a href="${f.path}">${f.name}</a></li>`;
          return html + "</ul>";
        };

        document.body.innerHTML =
          "<h1>CDH Metadata Standard schemas & vocabularies</h1>" + render(root);
      })();
    </script>
  </body>
</html>
