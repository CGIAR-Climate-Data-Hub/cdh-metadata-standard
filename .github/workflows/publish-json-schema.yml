name: Publish JSON Schemas

# On a published release, copy the schemas, the controlled vocabularies, and
# any STAC extension definitions into a versioned directory on the gh-pages
# branch. The resulting layout for tag <TAG> is:
#
#   <TAG>/
#     schemas/
#       core.schema.json
#       vocab/<name>.schema.json        # generated enum fragments
#       vocab/vocabulary.schema.json    # vocab meta-schema
#     extensions/
#       <ext-name>/schema.json          # CDH STAC extensions, when present
#     vocab/
#       <name>.json                     # source vocabulary concept lists
#   vocab/                              # unversioned mirror (latest release)
#     <name>.json                       # durable themes[].scheme targets
#
# Public URL pattern (assuming GitHub Pages on this repo):
#   https://<owner>.github.io/<repo>/<TAG>/schemas/core.schema.json
#   https://<owner>.github.io/<repo>/<TAG>/vocab/domain.json
#   https://<owner>.github.io/<repo>/vocab/domain.json   # unversioned scheme URL
#
# The CDH STAC extension does NOT carry its own inner version segment. The
# standard, schemas, vocabularies, and extension are released together under
# a single tag (see VERSIONING in standard.md).

# Triggers:
#   - published: fires when a release (including a pre-release) is first
#     published. Lets you cut a pre-release to preview the versioned URL.
#   - released: fires when a full release is published, or a pre-release is
#     promoted to a full release. Re-publishes the versioned dir (picking up any
#     changes) and updates the unversioned "latest" vocab mirror.
# A direct (non-pre-release) publish fires BOTH events, so the concurrency group
# serializes the two runs to avoid racing on the gh-pages push.
on:
  release:
    types: [published, released]

concurrency:
  group: publish-json-schema
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install tooling
        run: npm ci

      # Gate the publish on validation - never publish a broken schema graph.
      - name: Validate before publishing
        run: npm run check

      - name: Assemble publish directory
        run: |
          set -euo pipefail

          mirror() {
            # mirror <pattern-source> <target>
            # Copies every matching file under <pattern-source>, preserving
            # directory structure, into <target>.
            local src="$1" dest="$2"
            [ -d "$src" ] || return 0
            mkdir -p "$dest"
            # cp -R copies the directory's *contents*; trailing /. is important.
            cp -R "$src/." "$dest/"
          }

          # JSON Schemas (input schema + vocab fragments + vocab meta-schema)
          mirror spec/schemas publish/schemas

          # STAC extensions (and any other schema groups under spec/extensions/)
          mirror spec/extensions publish/extensions

          # Source controlled vocabularies (the concept lists themselves)
          mkdir -p publish/vocab
          find vocab -maxdepth 1 -type f -name '*.json' -exec cp {} publish/vocab/ \;

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v3.9.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish
          destination_dir: ${{ github.event.release.tag_name }}
          keep_files: true

      # Stable, unversioned mirror of the controlled vocabularies. The serialized
      # `themes[].scheme` URIs reference these durable URLs
      # (…/metadata/vocab/<name>.json), so they must resolve independently of any
      # release tag. Gated to full releases only, so "latest" never points at a
      # pre-release — pre-releases are still testable via the versioned URL above.
      - name: Publish stable vocabularies (unversioned)
        if: ${{ !github.event.release.prerelease }}
        uses: peaceiris/actions-gh-pages@v3.9.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish/vocab
          destination_dir: vocab
          keep_files: true
