name: Validate CDH records

# Reusable workflow that validates one or more CDH metadata YAML records
# against the CDH input schema.
#
# Usage from another repo:
#
#   jobs:
#     validate:
#       uses: CGIAR-Climate-Data-Hub/metadata/.github/workflows/validate-records.yaml@main
#       with:
#         path: ./metadata-records          # directory or file to validate
#
# Pin both refs to a release tag (e.g. @v0.0.1 above and tooling-ref: v0.0.1)
# to validate against a fixed version of the standard instead of latest.
#
on:
  workflow_call:
    inputs:
      path:
        description: Path (file or directory) in the caller repo to validate.
        required: true
        type: string
      changed-only:
        description: |
          When true, validate only the *.yaml/*.yml files under `path` that the
          PR (or push) added or modified, instead of the whole path. Intended for
          pull_request workflows so an unrelated pre-existing record can't block a
          submission.
        required: false
        default: false
        type: boolean
      tooling-ref:
        description: Git ref (tag, branch, or SHA) of the CDH standard repo to use as tooling.
        required: false
        default: main
        type: string
      tooling-repository:
        description: |
          GitHub repo providing the schemas + validator. Override when calling
           from a fork of this repo (set it to the fork's own github.repository)
           so the fork's CI tests its own changes instead of upstream.
        required: false
        default: CGIAR-Climate-Data-Hub/metadata
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out caller repo
        uses: actions/checkout@v6
        with:
          # Full history so changed-only can diff the PR/push base against HEAD.
          fetch-depth: 0

      - name: Check out CDH tooling
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.tooling-repository }}
          ref: ${{ inputs.tooling-ref }}
          path: _cdh-tooling

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: _cdh-tooling/package-lock.json

      - name: Install tooling
        working-directory: _cdh-tooling
        run: npm ci

      - name: Validate records
        if: ${{ !inputs.changed-only }}
        run: node _cdh-tooling/scripts/validate-yaml.js "${{ inputs.path }}"

      - name: List changed records
        id: changed
        if: ${{ inputs.changed-only }}
        env:
          # base.sha for pull_request, before for push; quoted path scopes the diff.
          BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          files=$(git diff --name-only --diff-filter=ACMR \
            "$BASE" HEAD -- "${{ inputs.path }}" | grep -E '\.ya?ml$' || true)
          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate changed records
        if: ${{ inputs.changed-only && steps.changed.outputs.files != '' }}
        env:
          FILES: ${{ steps.changed.outputs.files }}
        run: echo "$FILES" | xargs node _cdh-tooling/scripts/validate-yaml.js
