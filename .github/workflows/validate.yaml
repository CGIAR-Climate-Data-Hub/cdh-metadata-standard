name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Internal checks: the full local suite (markdown lint + schema/vocab/yaml
  # validation). `npm test` is the single source of truth, so CI never drifts
  # from what runs locally.
  internal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  # Validate this repo's own YAML records (spec/standard.yaml + examples/)
  # via the reusable workflow, so the reusable surface is exercised on every
  # push to main.
  records:
    uses: ./.github/workflows/validate-records.yaml
    with:
      path: spec/standard.yaml
      tooling-repository: ${{ github.repository }}
      tooling-ref: ${{ github.sha }}
