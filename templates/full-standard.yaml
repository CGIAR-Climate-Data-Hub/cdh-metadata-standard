# yaml-language-server: $schema=../spec/schemas/metadata-input.schema.json
cdh_schema_version: "v0.0.1"

# Encoding (required) — selects the serialization profile.
# One of: stac | ogc-records
encoding: ""

# Core Metadata (required)
id: ""
title: ""
description: >
  ""
license: ""
# Resource type — one of: dataset | document | tool | ai-skill
resource_type: ""

#   keywords:
#     - zonal statistics
#     - term: Food security
#       scheme: https://www.eionet.europa.eu/gemet/
#       uri: https://www.eionet.europa.eu/gemet/en/concept/1838
keywords: []
note: > # Optional
  ""

# Contact Metadata (required). At least one contact MUST use role: licensor.
contact:
  - name: "" # optional when organization is present; required for person-level contacts
    role: licensor # one of: licensor | producer | processor | host
    email: ""
    organization: "" # required when name is present; may be used on its own
    url: ""
  - name: ""
    role: ""
    email: ""
    organization: ""
    url: ""

# Citation Metadata
citation: "" # required
doi: "" # conditional - if doi exists
related_publications: # optional
  - citation: ""
    doi: ""

# metadata tracking (required/auto-populated)
# May be left blank in draft authoring files when CDH review manages metadata
# timestamps.
created:
updated:

# Version (conditional - if version exists already, or multiple versions are expected)
version: ""
previous_version: ""

# Funding (optional)
funding:
  - name: ""
    url: ""

# Spatial (conditional - if data has a spatial aspect/will be in STAC)
spatial:
  bbox: [] # [xmin, ymin, xmax, ymax]
  geography: [] # vocab/geography.json ids (UN M49), e.g. [world] or [kenya, uganda]
  crs: ""
  geometry_column: "" # conditional - if spatial vector with a geometry column exists
  resolution:
    - type: "" # one of xy, x, y, point, or polygon
      unit: ""
      value:
      label: ""
      reference_system: ""
      note: ""

temporal: # Temporal (conditional - if data has a temporal aspect/will be in STAC)
  start_date: ""
  end_date: ""
  resolution:
    values: [] # if named/easily interpretable - 1-12 for months, jan-feb-march, etc
    unit: "" # unit of the data - e.g., daily
    step: "" # ISO_8601#Durations (can be auto filled by cdh team)
    note: > # i.e. time specific usage notes, the aggregation method, etc.
      ""

# Data fields/Attributes (required)
dimensions:
  - name: ""
    type: ""
    description: ""
    values: []
    reference_system: "" # conditional, if a controlled vocabulary exists or key/value descriptions are needed

variables:
  - name: ""
    dimensions: []
    # Put the stable definition here. Add the normal reading rule here too when
    # direction matters.
    description: ""
    data_type: ""
    unit: ""
    # Put variable-specific limitations, caveats, or warnings here. Dataset-wide
    # limitations belong in the record-level `note` field.
    note: >
      ""

classes: # conditional, if classification scheme exists - must map to a listed variable
  - variable: ""
    values:
      - value:
        label: ""
        description: ""

# Additional fields for searching and filtering
cdh:
  use_cases: []
  not_recommended_for:
    - use: ""
      reason: ""
      use_instead: null
  domain: [climate] # Required - CDH-controlled vocabulary (vocab/domain.json)

climate:
  mip_era: ""
  scenarios: []
  models: # use `ensemble` to indicate a multi-model ensemble
    - ""
  hazards: []
  baseline:
    start_date: ""
    end_date: ""
  bias_adjustment:
    method: null
    reference_dataset: null
  downscaling:
    method: null
    resolution: null

commodities: [] # Required - CDH-controlled vocabulary (vocab/commodity.json)

# Data provenance / processing
# - `processing[]` is an ordered list of steps. When provided, at least one step
#   MUST use `id: source` and describe the original generation of the data.
processing:
  - id: source
    description:
    code:
      url:
      version:
    date:
    derived_from:
      - url: ""
        title: ""

# Data Urls (required)
data:
  - name: ""
    # Access locations for this asset. At least one is required. Add more
    # entries ONLY when they point at the SAME content via a different access
    # path (e.g., HTTPS and S3 URLs for the same file)
    #
    # Different content/formats (e.g., COG vs NetCDF) and services
    # queried rather than downloaded (e.g., a GEE collection) are SEPARATE
    # data entries, not extra locations here.
    locations:
      - url: ""
        title: "" # optional an access label (e.g., "HTTPS", "S3")
    processing_steps: [] # conditional, if processing metadata exists / steps are needed
    description: ""
    nodata: ""
    media_type: "" # provide if known
    file_size: "" # provide if known

additional_assets: # recommended - same guidelines as above data fields
  - name: ""
    locations:
      - url: ""
        title: ""
    description: ""
    media_type: ""
    roles: []
    file_size: ""

additional_links:
  - name: ""
    rel: ""
    url: ""
    description: ""
