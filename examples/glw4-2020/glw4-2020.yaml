        title: HTTPS
      - url: s3://digital-atlas/cdh/data/glw4-2020/glw4-2020.zarr
        title: S3
    processing_steps: [cloud-optimize]
    description: Zarr store of GLW 4 2020
    nodata: "NaN"
    media_type: application/vnd.zarr; version=3
    file_size: 31.1 MB
  - name: cogs
    locations:
