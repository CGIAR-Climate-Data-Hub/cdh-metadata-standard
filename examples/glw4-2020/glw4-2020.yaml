# metadata tracking
created: "2026-06-23"
updated: "2026-06-23"

spatial:
  bbox: [-180.0, -90.0, 180.0, 90.0]
  geography: [world]
  crs: EPSG:4326
  resolution:
    - type: xy
      unit: degree
      value: 0.08333333
      label: 5 arc-minutes (~10km at equator)

temporal:
  start_date: "2020-01-01"
  end_date: "2020-12-31"
  resolution:
    unit: year
    step: P1Y
    note: Static data for 2020 reference year

dimensions:
  - name: species
    type: species
    description: The livestock species for which the data is provided
    values: [buffalo, cattle, chicken, goat, pig, sheep]

variables:
  - name: Livestock Density
    description: Number of livestock per km2
    data_type: float32
    unit: "{head}/km-1"

cdh:
  use_cases:
    - Livestock exposure to hazards
    - Comparing livestock densities across systems or regions
  not_recommended_for:
    - use: Exact livestock counts
      reason: Values are spatially modeled estimates derived from census and other data
      use_instead: Official livestock census counts where available
  domain: [agricultural-production]

commodities: [livestock, buffalo, cattle, chickens, goats, swine, sheep]

processing:
  - id: source
    description: Original GLW 4 release
    date: "2024-07-15"
    derived_from:
      - url: https://data.apps.fao.org/catalog//iso/9d1e149b-d63f-4213-978b-317a8eb42d02
        title: GLW 4 2020
  - id: cloud-optimize
    description: Optimize data for cloud storage
    date: "2026-06-23"
