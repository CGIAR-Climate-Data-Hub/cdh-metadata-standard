id: glw4-2020
title: Gridded livestock density for 2020 (GLW4)
description: >
  Gridded Livestock of the World, version 4 (GLW 4) maps modelled densities of six livestock
  species: buffalo, cattle, sheep, goats, pigs, and chickens. This data is for the 2020 reference
  year. Densities are estimated with a Random Forest model that downscales harmonized subnational
  census counts onto a regular grid, so the values represent modelled distributions rather than
  direct observations. All of the values are number of animals per km^2
license: CC-BY-4.0
resource_type: dataset

keywords:
  - gridded
  - modelled
  - exposure
  - term: animal husbandry
    scheme: https://agrovoc.fao.org/
    uri: http://aims.fao.org/aos/agrovoc/c_8532
note: >
  Values are densities (head/km²), so individual pixel values are valid anywhere. However, the data
  are distributed in lat/long (EPSG:4326), where pixel ground area shrinks toward the poles. A
  standard lat/long map visually over-represents high-latitude densities, and naive spatial
  aggregation (totals, means, zonal statistics) assuming equal-area pixels will be biased. Reproject
  to an equal-area projection or weight by true pixel area for visualization and area-based
  analysis.

