scheme:
  id: cdh-agrovoc-hazards
  title: Climate Data Hub Hazard Vocabulary
  description: >
    Controlled vocabulary of climate-related hazards used by the Climate Data
    Hub for metadata validation, filtering, and catalog rendering. Each
    concept is a friendly Hub name; where applicable, it carries an AGROVOC
    code and URI.
  source_scheme:
    id: agrovoc
    uri: https://agrovoc.fao.org/
    title: AGROVOC

# AGROVOC code/uri left null for entries that still need lookup.
# Populate by searching AGROVOC for the closest concept and recording its
# code (e.g., c_12345) and full URI.

concepts:
